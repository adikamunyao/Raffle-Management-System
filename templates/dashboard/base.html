<!DOCTYPE html>
<html>
<head>
    <title>Raffle Dashboard</title>
    <style>
        body { font-family: Arial; background: #f5f5f5; }
        .container { width: 90%; margin: auto; padding: 20px; }
        .card { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn { padding: 10px; background: green; color: white; border: none; }
        textarea, input, select { width: 100%; padding: 10px; margin: 5px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎟️ Raffle Secretary Dashboard</h1>
    {% block content %}{% endblock %}
</div>

</body>
</html>
